upstream api {
    server api_service:8000;
}

server {
    listen 80;
    server_name _ localhost;

    # Увеличенный таймаут для LLM-эндпоинтов (до 3 попыток × 90s + backoff ≈ 273s)
    location /api/v1/assistant/ {
        proxy_pass http://api;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_read_timeout 290s;
        proxy_send_timeout 290s;
    }

    location / {
        proxy_pass http://api;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

}